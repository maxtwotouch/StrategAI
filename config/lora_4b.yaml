job: extension
config:
  name: flux2_klein_4b_lora
  process:
  - type: diffusion_trainer
  training_folder: ./output
  device: cuda
  trigger_word: <tdmp>
  network:
    type: lora
    linear: 32
    linear_alpha: 32
  save:
    dtype: bf16
    save_every: 500
    max_step_saves_to_keep: 10
  datasets:
  - folder_path: ./dataset/images
    default_caption: ''
    caption_ext: txt
    caption_dropout_rate: 0.05
    resolution:
    - 512
    - 768
    - 1024
  train:
    batch_size: 1
    gradient_accumulation: 2
    steps: 1500
    train_unet: true
    train_text_encoder: false
    gradient_checkpointing: true
    noise_scheduler: flowmatch
    optimizer: adamw_8bit
    timestep_type: sigmoid
    content_or_style: balanced
    lr: 0.0001
    weight_decay: 0.01
    dtype: bf16
    cache_text_embeddings: false
  model:
    name_or_path: black-forest-labs/FLUX.2-klein-4B
    quantize: true
    qtype: qfloat8
    arch: flux2_klein_4b
    low_vram: true
  sample:
    sampler: flowmatch
    sample_every: 500
    width: 1024
    height: 1024
    guidance_scale: 4
    sample_steps: 25
    seed: 42
    walk_seed: true
    samples:
    - prompt: A medieval granary building in steampunk industrial style, with aged
        stone masonry, dark timber bracing, and reinforced buttresses. The structure
        has a weathered, heavily used appearance with a desaturated retro color palette.
        Top-down front view, isolated on a white background. 16x16 pixel art, crisp
        edges, no anti-aliasing.
    - prompt: A lush green grass texture tile for top-down games, with dense micro-blade
        clusters, soft color variation, and faint dithering. Seamlessly repeatable
        in all directions with no objects or rocks near the edges. 16x16 pixel art,
        crisp edges, readable at small scale.
