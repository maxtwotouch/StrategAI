dataset_root: dataset
metadata_file: metadata.jsonl
image_dir: images
format: hf_jsonl
caption_source: metadata
caption_txt_extension: .txt
image_extensions:
  - png
  - jpg
  - jpeg
caption_column: text
id_column: id
image_column: file_name

# ── Trigger word (injected at training time by ai-toolkit) ──────────────────
# The toolkit prepends this to every caption and validation prompt automatically.
# Source captions should NOT contain the trigger word — it's a training artifact.
# Set to "" or null to disable.
trigger_word: "<tmp>"

resolution: 1024
repeats: 1
default_caption: ""
caption_max_chars: 700
shuffle_seed: 42
sampling:
  dataset_size: null
  stratify_column: asset_family
  seed: 42
