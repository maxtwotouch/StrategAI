run_name: flux2_klein_lora_v1
output_dir: runs/flux2_klein_lora_v1
training_folder: ./output
num_train_steps: 1500
save_every_steps: 500
eval_every_steps: 500
max_step_saves_to_keep: 10
learning_rate: 0.0001
train_batch_size: 1
gradient_accumulation_steps: 2
mixed_precision: bf16
gradient_checkpointing: true
seed: 42
optimizer: adamw_8bit
weight_decay: 0.01
timestep_type: sigmoid
content_or_style: balanced
noise_scheduler: flowmatch
train_text_encoder: false
cache_text_embeddings: false
caption_dropout_rate: 0.05
lora_rank: 32
lora_alpha: 32
validation_prompts:
- front view overhead shot elevated shot medium shot. The structure faces the
  camera straight from the front. The structure should flow into any inserted background.
  Isolate the object on a plain white background, only focusing on the specified object.
- front view overhead shot elevated shot medium shot. The entire image must
  be one single 16x16 pixel art tile that fully fills the frame with continuous texture.
  No borders, no centered composition, no empty space. Generate one cohesive tile
  that can be seamlessly repeated in all directions. No disruptive features or objects
  touching the outermost pixel edges.
validation_guidance_scale: 4.0
validation_num_inference_steps: 25
validation_width: 1024
validation_height: 1024
resolution_buckets:
- 512
- 768
- 1024
