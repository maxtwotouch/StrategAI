run_name: flux2_klein_lora_v1
output_dir: runs/flux2_klein_lora_v1
num_train_steps: 3000
save_every_steps: 200
eval_every_steps: 200
learning_rate: 8.0e-05
train_batch_size: 1
gradient_accumulation_steps: 8
max_grad_norm: 1.0
lr_scheduler: cosine
warmup_steps: 100
mixed_precision: bf16
gradient_checkpointing: true
num_workers: 2
seed: 42

# Optimizer settings
optimizer: adamw
weight_decay: 0.01
beta1: 0.9
beta2: 0.999

lora_rank: 32
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - to_q
  - to_k
  - to_v
  - to_out

# IMPORTANT: Run `./scripts/sync_validation_prompts.sh --max-prompts 6 --max-chars 420`
# to populate these from your actual dataset captions.
# Keep validation prompts short (<=420 chars) for stable Flux2 conditioning.
validation_prompts:
  - "<sks> medieval granary, top-down pixel art 16x16, steampunk industrial, stone and timber, white background"
  - "<sks> lush grass tile, seamless 16x16 pixel art, top-down game asset, green variation, no borders"
validation_images_per_prompt: 4
validation_guidance_scale: 3.5
validation_num_inference_steps: 28
