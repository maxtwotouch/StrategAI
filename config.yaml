# config.yaml — version-controlled, reproducible service configuration
# =====================================================================
# Every setting that defines *how* the service behaves lives here.
# Deployment-specific overrides (ComfyUI IP, bind host/port) go in .env
# and are transparently layered on top of these defaults.
# =====================================================================

# ---- Network ----------------------------------------------------------
host: "0.0.0.0"
port: 8000

# ---- ComfyUI connection -----------------------------------------------
# Single-node (backward-compatible):
#   comfyui:
#     base_url: "http://127.0.0.1:8188"
#     timeout: 300
#
# Multi-node (load-balanced across identical servers):
#   comfyui:
#     nodes:
#       - "http://192.168.1.10:8188"
#       - "http://192.168.1.11:8188"
#       - "http://192.168.1.12:8188"
#     timeout: 300
#     health_check_interval: 30   # seconds between re-pinging unhealthy nodes
#     max_retries: 3              # max nodes to try per generation before failing
comfyui:
  base_url: "http://127.0.0.1:8188"
  timeout: 300
  health_check_interval: 30
  max_retries: 3
  # Model warmup: submit a minimal generation at startup to preload DiT
  # weights into GPU VRAM.  Disable if your ComfyUI instance has
  # insufficient VRAM for an extra generation.
  warmup_enabled: true
  warmup_timeout: 120
  warmup_workflow: "background_tile"

# ---- Paths (all relative to project root) -----------------------------
paths:
  output_dir: "generated_assets"
  splash_dir: "splash_assets"
  static_tiles_dir: "static_tiles"
  leader_reference_dir: "leader_references"

# ---- HTTP server ------------------------------------------------------
server:
  cors_origins:
    - "http://localhost:3000"
  max_request_body_mb: 10
  cache_max_entries: 200
  cache_max_mb: 500
  api_key: ""

# ---- Rate limiting (token-bucket, global) -----------------------------
rate_limit:
  post_rps: 2.0        # max POST (generation) requests per second
  get_rps: 50.0        # max GET (read) requests per second
  burst_size: 5         # max burst for POST before throttling
  enabled: true

# ---- Generation modes (per asset family) ------------------------------
# Valid per-family: "comfyui" | "static" | "placeholder"
#
# Families:
#   structure, object, terrain    — game tile assets (txt2img)
#   background_tile               — seamless ground textures (background_tile.json)
#   unit                          — character sprites (txt2img)
#   leader                        — splash/profile/action pipeline (leader/*.json)
#   character_sprite, story, splash — reserved for future use
generation:
  modes:
    structure: "comfyui"
    object: "comfyui"
    terrain: "comfyui"
    background_tile: "comfyui"
    character_sprite: "comfyui"
    unit: "comfyui"
    leader: "comfyui"
    story: "comfyui"
    splash: "comfyui"
  default_mode: "comfyui"

# ---- Leader pipeline --------------------------------------------------
# Reserved for future leader-specific overrides (e.g. per-archetype LoRA
# strengths, pipeline stage retry counts, prompt weighting).
leader: {}
