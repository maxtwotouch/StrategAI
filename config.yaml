# config.yaml — version-controlled, reproducible service configuration
# =====================================================================
# Every setting that defines *how* the service behaves lives here.
# Deployment-specific overrides (ComfyUI IP, bind host/port) go in .env
# and are transparently layered on top of these defaults.
# =====================================================================

# ---- Network ----------------------------------------------------------
host: "0.0.0.0"
port: 8000

# ---- ComfyUI connection -----------------------------------------------
# Single-node (backward-compatible):
#   comfyui:
#     base_url: "http://127.0.0.1:8188"
#     timeout: 300
#
# Multi-node (load-balanced across identical servers):
#   comfyui:
#     nodes:
#       - "http://192.168.1.10:8188"
#       - "http://192.168.1.11:8188"
#       - "http://192.168.1.12:8188"
#     timeout: 300
#     health_check_interval: 30   # seconds between re-pinging unhealthy nodes
#     max_retries: 3              # max nodes to try per generation before failing
comfyui:
  base_url: "http://127.0.0.1:8188"
  timeout: 300
  health_check_interval: 30
  max_retries: 3

# ---- Paths (all relative to project root) -----------------------------
paths:
  output_dir: "generated_assets"
  splash_dir: "splash_assets"
  static_tiles_dir: "static_tiles"
  leader_reference_dir: "leader_references"

# ---- Generation modes (per asset family) ------------------------------
# Valid per-family: "comfyui" | "static" | "placeholder"
generation:
  modes:
    structure: "comfyui"
    object: "comfyui"
    terrain: "comfyui"
    leader: "comfyui"
    unit: "comfyui"
  default_mode: "comfyui"

# ---- Leader pipeline --------------------------------------------------
leader: {}
