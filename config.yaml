# config.yaml — version-controlled, reproducible service configuration
# =====================================================================
# Every setting that defines *how* the service behaves lives here.
# Deployment-specific overrides (ComfyUI IP, bind host/port) go in .env
# and are transparently layered on top of these defaults.
# =====================================================================

# ---- Network ----------------------------------------------------------
host: "0.0.0.0"
port: 8000

# ---- ComfyUI connection -----------------------------------------------
comfyui:
  base_url: "http://127.0.0.1:8188"
  timeout: 300

# ---- Paths (all relative to project root) -----------------------------
paths:
  output_dir: "generated_assets"
  splash_dir: "splash_assets"
  static_tiles_dir: "static_tiles"
  leader_reference_dir: "leader_references"

# ---- Generation modes (per asset family) ------------------------------
# Valid per-family: "comfyui" | "static" | "placeholder"
generation:
  modes:
    structure: "comfyui"
    object: "comfyui"
    terrain: "comfyui"
    leader: "comfyui"
    unit: "comfyui"
  default_mode: "comfyui"

# ---- Leader pipeline --------------------------------------------------
leader: {}
